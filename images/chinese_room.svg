<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="700" height="340" fill="#fbfbfa"/>

  <!-- Room -->
  <rect x="220" y="60" width="260" height="200" rx="6" fill="#f1ece0" stroke="#3a3a3a" stroke-width="2.5"/>
  <text x="350" y="45" text-anchor="middle" font-size="16" fill="#2a2a2a">房间(=计算机程序)</text>

  <!-- Person inside with rulebook -->
  <circle cx="330" cy="150" r="26" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="330" y="156" text-anchor="middle" font-size="20">🧑</text>
  <rect x="365" y="135" width="40" height="30" fill="#fff" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="385" y="155" text-anchor="middle" font-size="18">📖</text>
  <text x="350" y="200" text-anchor="middle" font-size="13" fill="#666">不懂中文,只按规则手册</text>
  <text x="350" y="218" text-anchor="middle" font-size="13" fill="#666">把符号换成另一些符号</text>

  <!-- Input arrow -->
  <text x="130" y="130" text-anchor="middle" font-size="20" fill="#2a2a2a">你好吗?</text>
  <path d="M100 145 L215 145" fill="none" stroke="#8a8a8a" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="155" y="120" text-anchor="middle" font-size="12" fill="#888">中文输入</text>

  <!-- Output arrow -->
  <text x="600" y="200" text-anchor="middle" font-size="20" fill="#2a2a2a">我很好</text>
  <path d="M485 175 L590 190" fill="none" stroke="#8a8a8a" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="545" y="165" text-anchor="middle" font-size="12" fill="#888">中文输出</text>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <text x="350" y="300" text-anchor="middle" font-size="14" fill="#333">房间外的人以为在和"懂中文"的对象交流</text>
  <text x="350" y="320" text-anchor="middle" font-size="14" fill="#c0392b">但房间里的人从头到尾都不理解中文的意思</text>
</svg>
