<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="640" height="380" fill="#fbfbfa"/>

  <!-- Top layer -->
  <rect x="170" y="30" width="300" height="70" rx="8" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="320" y="58" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f1f1f">顶层:执行整体计划</text>
  <text x="320" y="78" text-anchor="middle" font-size="12" fill="#555">"按顺序跑完所有配送点"</text>

  <!-- Middle layer -->
  <rect x="170" y="150" width="300" height="70" rx="8" fill="#d6e4dd" stroke="#3a3a3a" stroke-width="2"/>
  <text x="320" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f1f1f">中层:导航与避障</text>
  <text x="320" y="198" text-anchor="middle" font-size="12" fill="#555">"朝目标点前进,遇到障碍就绕开"</text>

  <!-- Bottom layer -->
  <rect x="170" y="270" width="300" height="70" rx="8" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="320" y="298" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f1f1f">底层:实时控制</text>
  <text x="320" y="318" text-anchor="middle" font-size="12" fill="#555">"读取传感器,直接控制电机转向"</text>

  <!-- Arrows down (commands) -->
  <path d="M260 100 L260 150" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ad)"/>
  <text x="220" y="128" text-anchor="middle" font-size="11" fill="#555">下达目标</text>

  <path d="M260 220 L260 270" fill="none" stroke="#555" stroke-width="1.8" marker-end="url(#ad)"/>
  <text x="220" y="248" text-anchor="middle" font-size="11" fill="#555">下达指令</text>

  <!-- Arrows up (feedback) -->
  <path d="M400 150 L400 100" fill="none" stroke="#888" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#au)"/>
  <text x="440" y="128" text-anchor="middle" font-size="11" fill="#888">"到达/超时"</text>

  <path d="M400 270 L400 220" fill="none" stroke="#888" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#au)"/>
  <text x="440" y="248" text-anchor="middle" font-size="11" fill="#888">"碰到障碍了"</text>

  <defs>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="au" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <text x="320" y="360" text-anchor="middle" font-size="12" fill="#666">每一层负责不同的时间尺度和抽象层级,下层出问题时可以直接反馈给上层</text>
</svg>
