<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="700" height="320" fill="#fbfbfa"/>

  <!-- Interrogator -->
  <circle cx="110" cy="140" r="34" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="110" y="146" text-anchor="middle" font-size="26">🧑</text>
  <text x="110" y="200" text-anchor="middle" font-size="16" fill="#2a2a2a">提问者</text>
  <text x="110" y="222" text-anchor="middle" font-size="13" fill="#666">(人类)</text>

  <!-- Divider wall -->
  <rect x="290" y="40" width="10" height="220" fill="#b8b0a2"/>
  <text x="295" y="30" text-anchor="middle" font-size="14" fill="#888">看不见对方</text>

  <!-- Human behind wall -->
  <circle cx="440" cy="90" r="30" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-size="22">🧑</text>
  <text x="440" y="140" text-anchor="middle" font-size="15" fill="#2a2a2a">真人</text>

  <!-- Machine behind wall -->
  <rect x="410" y="200" width="60" height="60" rx="8" fill="#d6e4dd" stroke="#3a3a3a" stroke-width="2"/>
  <text x="440" y="242" text-anchor="middle" font-size="26">🤖</text>
  <text x="440" y="285" text-anchor="middle" font-size="15" fill="#2a2a2a">AI 系统</text>

  <!-- Question mark and arrows -->
  <text x="360" y="150" text-anchor="middle" font-size="30" fill="#c0392b">?</text>

  <path d="M150 130 Q220 100 400 90" fill="none" stroke="#8a8a8a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M150 155 Q220 210 400 220" fill="none" stroke="#8a8a8a" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <text x="350" y="300" text-anchor="middle" font-size="14" fill="#666">提问者只通过文字对话,判断哪个是人、哪个是机器</text>
</svg>
