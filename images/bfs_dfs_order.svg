<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect x="0" y="0" width="700" height="380" fill="#fbfbfa"/>

  <!-- BFS panel -->
  <text x="170" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f6f4f">广度优先(BFS)</text>

  <circle cx="170" cy="60" r="20" fill="#d6e4dd" stroke="#3a3a3a" stroke-width="2"/>
  <text x="170" y="65" text-anchor="middle" font-size="13">1</text>

  <circle cx="100" cy="140" r="20" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" font-size="13">2</text>
  <circle cx="240" cy="140" r="20" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="240" y="145" text-anchor="middle" font-size="13">3</text>

  <circle cx="60" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="60" y="225" text-anchor="middle" font-size="13">4</text>
  <circle cx="140" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="140" y="225" text-anchor="middle" font-size="13">5</text>
  <circle cx="200" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-size="13">6</text>
  <circle cx="280" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="280" y="225" text-anchor="middle" font-size="13">7</text>

  <path d="M170 80 L100 120" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M170 80 L240 120" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M100 160 L60 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M100 160 L140 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M240 160 L200 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M240 160 L280 200" stroke="#888" stroke-width="1.4" fill="none"/>

  <text x="170" y="270" text-anchor="middle" font-size="12" fill="#666">按层扩展:先看完第1层全部,再看第2层...</text>

  <!-- DFS panel -->
  <text x="520" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#a03b2e">深度优先(DFS)</text>

  <circle cx="520" cy="60" r="20" fill="#d6e4dd" stroke="#3a3a3a" stroke-width="2"/>
  <text x="520" y="65" text-anchor="middle" font-size="13">1</text>

  <circle cx="450" cy="140" r="20" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" font-size="13">2</text>
  <circle cx="590" cy="140" r="20" fill="#e8ded0" stroke="#3a3a3a" stroke-width="2"/>
  <text x="590" y="145" text-anchor="middle" font-size="13">6</text>

  <circle cx="410" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="410" y="225" text-anchor="middle" font-size="13">3</text>
  <circle cx="490" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="490" y="225" text-anchor="middle" font-size="13">5</text>
  <circle cx="550" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="550" y="225" text-anchor="middle" font-size="13">7</text>
  <circle cx="630" cy="220" r="20" fill="#f1e0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="630" y="225" text-anchor="middle" font-size="13">8</text>

  <circle cx="380" cy="300" r="20" fill="#e0d0d6" stroke="#3a3a3a" stroke-width="2"/>
  <text x="380" y="305" text-anchor="middle" font-size="13">4</text>

  <path d="M520 80 L450 120" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M520 80 L590 120" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M450 160 L410 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M450 160 L490 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M590 160 L550 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M590 160 L630 200" stroke="#888" stroke-width="1.4" fill="none"/>
  <path d="M410 240 L380 280" stroke="#888" stroke-width="1.4" fill="none"/>

  <text x="520" y="340" text-anchor="middle" font-size="12" fill="#666">一路走到底:先把一条分支扎到最深,再回头试下一条</text>
</svg>
